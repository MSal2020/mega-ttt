<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#F7F6F3" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mega TTT" />
    <meta name="description" content="Mega Tic Tac Toe — a strategic multiplayer board game with powers, large grids, and customisable rules." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Mega Tic Tac Toe</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #F7F6F3;
        overscroll-behavior: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Avoid stale-cache blank screens in local dev (especially Safari):
      // register SW only in production builds, and actively unregister in dev.
      const isDevHost = location.hostname === "localhost" || location.hostname === "127.0.0.1";
      if ("serviceWorker" in navigator) {
        if (isDevHost) {
          navigator.serviceWorker.getRegistrations().then((regs) => {
            for (const reg of regs) reg.unregister();
          });
          if ("caches" in window) {
            caches.keys().then((keys) => {
              for (const key of keys) caches.delete(key);
            });
          }
        } else {
          window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js"));
        }
      }
    </script>
  </body>
</html>
